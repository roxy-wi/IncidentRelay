<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="apple-touch-icon" sizes="180x180" href="{{ url_for('static', filename='images/favicon/apple-touch-icon.png') }}">
    <link rel="icon" type="image/png" sizes="32x32" href="{{ url_for('static', filename='images/favicon/favicon-32x32.png') }}">
    <link rel="icon" type="image/png" sizes="16x16" href="{{ url_for('static', filename='images/favicon/favicon-16x16.png') }}">
    <link rel="shortcut icon" href="{{ url_for('static', filename='images/favicon/favicon.ico') }}">
    <link rel="manifest" href="{{ url_for('static', filename='images/favicon/site.webmanifest') }}">
    <meta name="theme-color" content="#0b5cff">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IncidentRelay - Login</title>
    <link rel="stylesheet" href="/static/css/login.css">
    <script src="/static/js/vendor/jquery-3.7.1.min.js"></script>
    <script src="/static/js/pages/login.js"></script>
    <script src="/static/js/common.js"></script>
</head>
<body>
<div class="login-page">
    <div class="login-card">
        <div class="login-brand-block">
            <a href="/" class="login-brand-link" title="IncidentRelay">
                <img
                    class="login-brand-logo"
                    src="/static/images/incidentrelay-logo.svg"
                    alt="IncidentRelay"
                >
            </a>
        </div>

        <div class="login-form-wrap">
            <div class="login-badge">Secure operator access</div>

            <h1>Sign in</h1>
            <p class="login-description">
                Manage schedules, acknowledge alerts and coordinate incident response from one place.
            </p>

            <div id="login-error" class="login-error" style="display:none;"></div>

            <form id="login-form" method="post" action="/api/auth/login">
                <div class="form-group">
                    <label for="username">Username</label>
                    <input
                        id="username"
                        name="username"
                        type="text"
                        placeholder="Enter username"
                        autocomplete="username"
                    >
                </div>

                <div class="form-group">
                    <label for="password">Password</label>
                    <input
                        id="password"
                        name="password"
                        type="password"
                        placeholder="Enter password"
                        autocomplete="current-password"
                    >
                </div>

                <button type="submit" class="btn-login">Sign in</button>
            </form>

            <div class="login-note">
                JWT protected session
            </div>
        </div>
    </div>
</div>
<script>
$(function () {
    $('#login-form').on('submit', function (e) {
        login();
        e.preventDefault();
    });
});
</script>
</body>
</html>
