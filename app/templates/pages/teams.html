<div class="grid-two">
    <div class="card">
        <div class="card-header"><h2 id="team-form-title">Create team</h2></div>
        <div class="form-body">
            <input id="team-id" type="hidden">

            <label>Group</label>
            <select id="team-group" class="input"></select>

            <label>Slug</label>
            <input id="team-slug" class="input" placeholder="infra">

            <label>Name</label>
            <input id="team-name" class="input" placeholder="Infrastructure">

            <label>Description</label>
            <input id="team-description" class="input">

            <label>Escalate after reminders</label>
            <input id="team-escalation-after" class="input" type="number" value="2">

            <label><input id="team-escalation-enabled" type="checkbox" checked> Escalation enabled</label>
            <label><input id="team-active" type="checkbox" checked> Active</label>

            <div class="actions">
                <button id="save-team" type="button" class="btn btn-primary">Save team</button>
                <button id="reset-team-form" type="button" class="btn">Reset</button>
            </div>
        </div>
    </div>

    <div class="card">
        <div class="card-header">
            <h2>Teams</h2>
            <button id="reload-teams" type="button" class="btn btn-primary">Reload</button>
        </div>

        <div class="table-wrapper">
            <table class="data-table">
                <thead>
                <tr>
                    <th>ID</th>
                    <th>Group</th>
                    <th>Slug</th>
                    <th>Name</th>
                    <th>Escalation</th>
                    <th>Active</th>
                    <th>Actions</th>
                </tr>
                </thead>
                <tbody id="teams-table"></tbody>
            </table>
        </div>
    </div>
</div>

<div class="grid-two">
    <div class="card">
        <div class="card-header">
            <div>
                <h2 id="team-members-title">Team members</h2>
                <div class="card-subtitle">Select a team and click Members</div>
            </div>
        </div>

        <div class="table-wrapper">
            <table class="data-table">
                <thead>
                <tr><th>ID</th><th>User</th><th>Name</th><th>Role</th><th>Active</th><th>Actions</th></tr>
                </thead>
                <tbody id="team-members-table">
                <tr><td colspan="6">No team selected</td></tr>
                </tbody>
            </table>
        </div>
    </div>

    <div class="card form-card">
        <div class="card-header"><h2 id="team-member-form-title">Add user to selected team</h2></div>
        <div class="form-body">
            <input id="team-member-id" type="hidden">
            <input id="team-member-team-id" type="hidden">

            <label>Selected team</label>
            <input id="team-member-team-name" class="input" disabled placeholder="Click Members on a team first">

            <label>User</label>
            <select id="team-member-user" class="input"></select>

            <label>Role</label>
            <select id="team-member-role" class="input">
                <option value="read_only">Read only</option>
                <option value="rw">Read/write</option>
            </select>

            <label><input id="team-member-active" type="checkbox" checked> Active</label>

            <div class="actions">
                <button id="save-team-user" type="button" class="btn btn-primary">Save membership</button>
                <button id="reset-team-member-form" type="button" class="btn">Reset</button>
            </div>
        </div>
    </div>
</div>
