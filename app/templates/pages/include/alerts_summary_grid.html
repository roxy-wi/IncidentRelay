<div id="{{ summary_id }}" class="alerts-summary-grid">
    <div class="alerts-summary-card alerts-summary-danger">
        <div class="alerts-summary-icon">!</div>
        <div>
            <div class="alerts-summary-title">Firing alerts</div>
            <div class="alerts-summary-value" data-summary-value="firing">0</div>
            <div class="alerts-summary-hint">Need attention</div>
        </div>
    </div>

    <div class="alerts-summary-card alerts-summary-warning">
        <div class="alerts-summary-icon">✓</div>
        <div>
            <div class="alerts-summary-title">Acknowledged</div>
            <div class="alerts-summary-value" data-summary-value="acknowledged">0</div>
            <div class="alerts-summary-hint">Someone is working</div>
        </div>
    </div>

    <div class="alerts-summary-card alerts-summary-success">
        <div class="alerts-summary-icon">✓</div>
        <div>
            <div class="alerts-summary-title">Resolved</div>
            <div class="alerts-summary-value" data-summary-value="resolved">0</div>
            <div class="alerts-summary-hint">Closed incidents</div>
        </div>
    </div>

    <div class="alerts-summary-card alerts-summary-info">
        <div class="alerts-summary-icon">↻</div>
        <div>
            <div class="alerts-summary-title">Reminders</div>
            <div class="alerts-summary-value" data-summary-value="reminders">0</div>
            <div class="alerts-summary-hint">Repeated notifications</div>
        </div>
    </div>

    <div class="alerts-summary-card alerts-summary-primary">
        <div class="alerts-summary-icon">#</div>
        <div>
            <div class="alerts-summary-title">Total alerts</div>
            <div class="alerts-summary-value" data-summary-value="total">0</div>
            <div class="alerts-summary-hint">Current selection</div>
        </div>
    </div>
</div>
