<link rel="stylesheet" href="/static/css/alerts_modal.css">

<div class="card">
    <div class="card-header">
        <h2>Alerts</h2>
        <div class="toolbar">
            <select id="status-filter" class="input">
                <option value="">All</option>
                <option value="firing">Firing</option>
                <option value="acknowledged">Acknowledged</option>
                <option value="resolved">Resolved</option>
                <option value="silenced">Silenced</option>
            </select>
            <button class="btn btn-primary" id="reload-alerts">Reload</button>
        </div>
    </div>

    <div class="table-wrapper">
        <table class="data-table alerts-table">
            <thead>
            <tr>
                <th>ID</th>
                <th>Team</th>
                <th>Severity</th>
                <th>Title</th>
                <th>Created</th>
                <th>Status</th>
                <th>Assignee</th>
                <th>Actions</th>
            </tr>
            </thead>
            <tbody id="alerts-table"></tbody>
        </table>
    </div>
</div>

{% include 'pages/include/alerts_modal.html' %}
