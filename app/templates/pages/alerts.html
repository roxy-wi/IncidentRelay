<div class="card">
    <div class="card-header">
        <h2>Alerts</h2>
        <div class="toolbar">
            <select id="status-filter" class="input">
                <option value="">All</option>
                <option value="firing">Firing</option>
                <option value="acknowledged">Acknowledged</option>
                <option value="resolved">Resolved</option>
                <option value="silenced">Silenced</option>
            </select>
            <button class="btn btn-primary" id="reload-alerts">Reload</button>
        </div>
    </div>
    <div class="table-wrapper">
        <table class="data-table">
            <thead>
            <tr>
                <th>ID</th>
                <th>Team</th>
                <th>Source</th>
                <th>Severity</th>
                <th>Title</th>
                <th>Status</th>
                <th>Route</th>
                <th>Rotation</th>
                <th>Assignee</th>
                <th>Last seen</th>
                <th>Reminders</th>
                <th>Escalation</th>
                <th>Actions</th>
            </tr>
            </thead>
            <tbody id="alerts-table"></tbody>
        </table>
    </div>
</div>

<div class="card" id="alert-details-card" style="display: none;">
    <div class="card-header">
        <div>
            <h2 id="alert-details-title">Alert details</h2>
            <div class="card-subtitle" id="alert-details-subtitle"></div>
        </div>
        <button class="btn" id="close-alert-details">Close</button>
    </div>
    <div class="form-body">
        <div id="alert-details-summary" class="details-grid"></div>
        <label>Labels</label>
        <pre id="alert-details-labels" class="code-box"></pre>
        <label>Events</label>
        <div id="alert-details-events" class="event-list"></div>
        <label>Notification delivery</label>
        <div id="alert-details-notifications" class="event-list"></div>
        <label>Payload</label>
        <pre id="alert-details-payload" class="code-box"></pre>
    </div>
</div>
