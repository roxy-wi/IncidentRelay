<link rel="stylesheet" href="{{ url_for('static', filename='css/alerts.css') }}">

<div class="alerts-page">
    {% set summary_id = "alerts-alerts-summary" %}
    {% include 'pages/include/alerts_summary_grid.html' %}

    <section class="card alerts-card">
        <div class="card-header alerts-card-header">
            <div>
                <h2>Alert inbox</h2>
                <div class="card-subtitle">
                    Showing
                    <span id="alerts-page-from">0</span>-<span id="alerts-page-to">0</span>
                    of <span id="alerts-filtered-count">0</span>
                    alerts
                    <span id="alerts-total-wrapper">
                        / <span id="alerts-total-count">0</span> total
                    </span>
                </div>
            </div>

            <div class="card-header-actions">
                <label class="alerts-switch">
                    <input id="alerts-auto-refresh" type="checkbox">
                    <span>Auto refresh</span>
                </label>

                <button id="reload-alerts" type="button" class="btn btn-primary">
                    Reload
                </button>
            </div>
        </div>

        <div class="alerts-toolbar">
            <div class="alerts-search">
                <span class="alerts-search-icon">⌕</span>
                <input
                    id="alerts-search"
                    class="input"
                    type="search"
                    placeholder="Search by id, title, team, assignee, source..."
                    autocomplete="off"
                >
            </div>

            <select id="status-filter" class="input alerts-filter-select">
                <option value="">All statuses</option>
                <option value="firing">Firing</option>
                <option value="acknowledged">Acknowledged</option>
                <option value="resolved">Resolved</option>
                <option value="silenced">Silenced</option>
            </select>

            <select id="severity-filter" class="input alerts-filter-select">
                <option value="">All severities</option>
                <option value="critical">Critical</option>
                <option value="high">High</option>
                <option value="medium">Medium</option>
                <option value="low">Low</option>
            </select>

            <select id="alerts-sort" class="input alerts-filter-select">
                <option value="activity_desc">Newest activity</option>
                <option value="created_desc">Newest created</option>
                <option value="created_asc">Oldest created</option>
                <option value="severity_desc">Severity first</option>
                <option value="status_asc">Status</option>
            </select>
        </div>

        <div id="alerts-active-filters" class="alerts-active-filters"></div>

        <div class="table-wrapper">
            <table class="data-table alerts-table alerts-inbox-table">
                <thead>
                <tr>
                    <th>Status</th>
                    <th>ID</th>
                    <th>Alert</th>
                    <th>Severity</th>
                    <th>Team</th>
                    <th>Assignee</th>
                    <th>Created</th>
                    <th>Last seen</th>
                    <th>Reminders</th>
                    <th class="alerts-actions-th">Actions</th>
                </tr>
                </thead>
                <tbody id="alerts-table"></tbody>
            </table>
        </div>
        <div class="alerts-pagination">
            <div class="alerts-pagination-left">
                <span>Rows per page</span>

                <select id="alerts-page-size" class="input alerts-page-size">
                    <option value="10">10</option>
                    <option value="25" selected>25</option>
                    <option value="50">50</option>
                    <option value="100">100</option>
                </select>
            </div>

            <div class="alerts-pagination-center">
                Page <span id="alerts-current-page">1</span>
                of <span id="alerts-total-pages">1</span>
            </div>

            <div class="alerts-pagination-actions">
                <button id="alerts-prev-page" type="button" class="btn btn-small">
                    Previous
                </button>

                <button id="alerts-next-page" type="button" class="btn btn-small">
                    Next
                </button>
            </div>
        </div>
    </section>
</div>
