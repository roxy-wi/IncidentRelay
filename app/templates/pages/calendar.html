<link rel="stylesheet" href="/static/css/calendar_week.css">

<div class="calendar-page">
    <div class="calendar-summary-grid">
        <div class="calendar-summary-card calendar-summary-primary">
            <div class="calendar-summary-icon">👥</div>
            <div>
                <div class="calendar-summary-title">Visible teams</div>
                <div id="calendar-summary-teams" class="calendar-summary-value">0</div>
                <div class="calendar-summary-hint">Current calendar scope</div>
            </div>
        </div>

        <div class="calendar-summary-card calendar-summary-success">
            <div class="calendar-summary-icon">✓</div>
            <div>
                <div class="calendar-summary-title">People on call</div>
                <div id="calendar-summary-users" class="calendar-summary-value">0</div>
                <div class="calendar-summary-hint">Unique users in range</div>
            </div>
        </div>

        <div class="calendar-summary-card calendar-summary-warning">
            <div class="calendar-summary-icon">↻</div>
            <div>
                <div class="calendar-summary-title">Assignments</div>
                <div id="calendar-summary-assignments" class="calendar-summary-value">0</div>
                <div class="calendar-summary-hint">Scheduled shifts</div>
            </div>
        </div>

        <div class="calendar-summary-card calendar-summary-info">
            <div class="calendar-summary-icon">⌁</div>
            <div>
                <div class="calendar-summary-title">Overrides</div>
                <div id="calendar-summary-overrides" class="calendar-summary-value">0</div>
                <div class="calendar-summary-hint">Manual changes</div>
            </div>
        </div>
    </div>

    <div class="calendar-layout-grid">
        <section class="card calendar-card">
            <div class="card-header calendar-header">
                <div>
                    <h2>On-call calendar</h2>
                    <div id="calendar-range-title" class="card-subtitle">Current week</div>
                </div>

                <div class="calendar-header-actions">
                    <button id="calendar-today" type="button" class="btn btn-small">Today</button>
                    <button id="calendar-prev" type="button" class="btn btn-small">‹</button>
                    <button id="calendar-next" type="button" class="btn btn-small">›</button>
                    <button id="reload-calendar" type="button" class="btn btn-primary btn-small">Reload</button>
                </div>
            </div>

            <div class="calendar-toolbar">
                <div class="calendar-search">
                    <span class="calendar-search-icon">⌕</span>
                    <input
                        id="calendar-search"
                        class="input"
                        type="search"
                        placeholder="Filter users or rotations..."
                        autocomplete="off"
                    >
                </div>

                <select id="calendar-team-filter" class="input calendar-team-filter">
                    <option value="">All teams</option>
                </select>

                <div class="calendar-date-range">
                    <input id="calendar-start" class="input" type="date">
                    <span>—</span>
                    <input id="calendar-end" class="input" type="date">
                </div>
            </div>

            <div class="calendar-body">
                <div id="calendar-legend" class="calendar-legend"></div>
                <div id="calendar-grid" class="calendar-week-grid"></div>
            </div>
        </section>

        <aside class="card calendar-details-card">
            <div class="card-header calendar-details-header">
                <div>
                    <h2>Shift details</h2>
                    <div id="calendar-details-subtitle" class="card-subtitle">Select an assignment</div>
                </div>
            </div>

            <div id="calendar-details-body" class="calendar-details-body">
                <div class="calendar-details-empty">
                    Click any shift in the calendar to see user, team, rotation and time range.
                </div>
            </div>
        </aside>
    </div>
</div>
