<div class="card form-card">
    <div class="card-header">
        <h2>Login</h2>
    </div>
    <div class="form-body">
        <label>Username</label>
        <input id="login-username" class="input" placeholder="admin">

        <label>Password</label>
        <input id="login-password" class="input" type="password" placeholder="password">

        <div class="actions">
            <button id="login-submit" class="btn btn-primary">Login</button>
            <button id="logout-submit" class="btn">Logout</button>
        </div>

        <div class="help-text">
            JWT token is stored in an HTTP cookie for page access and in browser localStorage for API calls.
        </div>

        <pre id="login-status" class="code-box"></pre>
    </div>
</div>
