# On-call service configuration file.
# Recommended production path: /etc/oncall/oncall.conf

[main]
secret_key = change-this-secret-key
timezone = UTC
public_base_url = http://127.0.0.1:8080

[database]
# Supported values: sqlite, mysql, postgresql
type = sqlite

# SQLite example:
name = oncall.db

# PostgreSQL/MySQL example:
# name = oncall
# user = oncall
# password = password
# host = 127.0.0.1
# port = 5432

[auth]
# Enable API auth for regular API endpoints.
api_auth_required = true

# Enable API auth for incoming Alertmanager/Zabbix/webhook endpoints.
webhook_auth_required = false

# RBAC is implemented as a future-ready switch.
rbac_enforced = true

# JWT settings for web and API authentication.
jwt_secret = change-this-jwt-secret
jwt_expire_minutes = 1440
jwt_cookie_name = oncall_jwt
jwt_cookie_secure = false

[alerts]
# Fallback reminder interval for alerts without a rotation-specific setting.
reminder_after_seconds = 300

# How often the reminder scheduler scans unacknowledged alerts.
reminder_interval_seconds = 60

# Deduplicate alerts with the same source and dedup key within this window.
alert_group_window_seconds = 3600

[scheduler]
# Database lock TTL for scheduler jobs.
lock_ttl_seconds = 120

[mattermost]
# Used to validate Mattermost interactive button callbacks.
action_secret = change-this-mattermost-action-secret

[smtp]
host =
port = 587
user =
password =
from = oncall@example.com
use_tls = true

[logging]
# Only user actions, incoming alerts and errors are written as JSON lines.
file = ./logs/oncall.log
level = INFO
requests = false
